## planner profile — DeepSeek V4 reasoning for task decomposition
## Usage: hermes -p planner

model:
  default: deepseek/deepseek-v4-flash
  provider: nous
  base_url: https://inference-api.nousresearch.com/v1
  api_mode: chat_completions
providers: {}
fallback_providers:
- provider: opencode-go
  model: deepseek-v4-flash
  base_url: https://opencode.ai/zen/go/v1
  api_mode: chat_completions
credential_pool_strategies: {}

## Planner needs strong reasoning, longer context, more turns
agent:
  max_turns: 200
  tool_use_enforcement: auto
  reasoning_effort: high
  gateway_timeout: 1200
  api_max_retries: 4

## Toolsets: research, search, memory — no heavy execution
toolsets:
- hermes-cli
- web
- memory
- session_search
- skills
- code_execution
- file
- vision

display:
  personality: technical
  show_reasoning: true
  show_cost: true
  streaming: true
  interim_assistant_messages: true

## Scheduling:
## Nous: no known peak constraints
## OpenCode: no known peak constraints
compression:
  enabled: true
  threshold: 0.4
  target_ratio: 0.15
  protect_last_n: 25
