## worker profile — K2.6 execution engine
## Usage: hermes -p worker

model:
  default: k2.6
  provider: kimi-coding
  base_url: https://api.moonshot.cn/v1
  api_mode: chat_completions
providers: {}
fallback_providers:
- provider: nous
  model: deepseek/deepseek-v4-flash
  base_url: https://inference-api.nousresearch.com/v1
  api_mode: chat_completions
credential_pool_strategies: {}

## K2.6 is an execution engine, not a thinker.
## Keep context tight, max turns moderate, no reasoning fluff.
agent:
  max_turns: 60
  tool_use_enforcement: required
  reasoning_effort: ""
  gateway_timeout: 600
  api_max_retries: 4

## Toolsets: full system access for execution
toolsets:
- hermes-cli
- terminal
- file
- code_execution
- web
- memory
- session_search
- skills
- vision
- image_gen
- tts
- cronjob

display:
  personality: concise
  show_reasoning: false
  show_cost: true
  streaming: true
  interim_assistant_messages: false

## Scheduling:
## Moonshots direct: 16:00–02:00 UTC+2 (shared infra with MIMO)
## Nous: no known peak constraints
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 10
