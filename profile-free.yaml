## free profile — ring-2.6-1t (OpenRouter free tier)
## Usage: hermes -p free

model:
  default: inclusionai/ring-2.6-1t:free
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions
providers: {}
fallback_providers:
- provider: nous
  model: qwen/qwen3.6-plus
  base_url: https://inference-api.nousresearch.com/v1
credential_pool_strategies: {}

## Free-tier profile: lighter toolset, no heavy execution
## Use for: quick analysis, reasoning, QA on a budget
agent:
  max_turns: 120
  tool_use_enforcement: auto
  reasoning_effort: high
  gateway_timeout: 600
  api_max_retries: 3

## Toolsets: read-heavy, search, memory — no code execution or system access
toolsets:
- hermes-cli
- web
- memory
- session_search
- skills
- file
- vision

display:
  personality: helpful
  show_reasoning: true
  show_cost: true
  streaming: true
  interim_assistant_messages: true

## Scheduling:
## No known peak constraints on OpenRouter
## Nous: no known peak constraints
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 15
