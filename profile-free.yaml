## free profile — DeepSeek V4 Flash (zero-cost investigation)
## Usage: hermes -p free
## Primary: deepseek/deepseek-v4-flash on Nous (free, may be temp)
## Fallback: stepfun/step-3.5-flash on Nous (free, proven in auxiliary tasks)

model:
  default: deepseek/deepseek-v4-flash
  provider: nous
  base_url: https://inference-api.nousresearch.com/v1
  api_mode: chat_completions
providers: {}
fallback_providers:
- provider: openrouter
  model: deepseek/deepseek-v4-flash:free
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions
- provider: opencode-go
  model: deepseek-v4-flash
  base_url: https://api.opencode.ai/v1
  api_mode: chat_completions
- provider: nous
  model: stepfun/step-3.5-flash
  base_url: https://inference-api.nousresearch.com/v1
credential_pool_strategies: {}

## Free-tier profile: lighter toolset, no heavy execution
## Use for: quick analysis, reasoning, investigation on a budget
agent:
  max_turns: 120
  tool_use_enforcement: auto
  reasoning_effort: high
  gateway_timeout: 600
  api_max_retries: 3

## Toolsets: read-heavy, search, memory — no code execution or system access
toolsets:
- hermes-cli
- web
- memory
- session_search
- skills
- file
- vision

display:
  personality: helpful
  show_reasoning: true
  show_cost: true
  streaming: true
  interim_assistant_messages: true

## Scheduling:
## No known peak constraints on Nous
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 15
