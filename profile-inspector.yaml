## inspector profile — DeepSeek V4 Flash via Nous (post-Ollama)
## Usage: hermes -p inspector
## Note: Ollama Cloud gone — replaced with Nous primary.
##        GLM not available outside ollama-cloud, moved to DeepSeek V4.

model:
  default: deepseek/deepseek-v4-flash
  provider: nous
  base_url: https://inference-api.nousresearch.com/v1
  api_mode: chat_completions
providers: {}
fallback_providers:
- provider: opencode-go
  model: deepseek-v4-flash
  base_url: https://opencode.ai/zen/go/v1
  api_mode: chat_completions
credential_pool_strategies: {}

## Inspector: quality assurance, review, catch mistakes
## Needs patience, thoroughness, long context for auditing
agent:
  max_turns: 300
  tool_use_enforcement: auto
  reasoning_effort: high
  gateway_timeout: 1200
  api_max_retries: 3

## Toolsets: read-heavy, memory, search — inspection toolkit
toolsets:
- hermes-cli
- memory
- session_search
- skills
- file
- vision
- code_execution

display:
  personality: helpful
  show_reasoning: true
  show_cost: false
  streaming: true
  interim_assistant_messages: true

## Scheduling:
## Nous: no known peak constraints
## OpenCode: no known peak constraints
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
