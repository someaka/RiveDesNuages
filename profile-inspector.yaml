## inspector profile — GLM5.1:cloud via Ollama Cloud (hosted, not local)
## Usage: hermes -p inspector

model:
  default: glm5.1:cloud
  provider: ollama-cloud
  base_url: https://api.ollama.cloud/v1
  api_mode: chat_completions
providers: {}
fallback_providers:
- provider: nous
  model: qwen/qwen3.6-plus
  base_url: https://inference-api.nousresearch.com/v1
credential_pool_strategies: {}

## Inspector: quality assurance, review, catch mistakes
## Needs patience, thoroughness, long context for auditing
agent:
  max_turns: 300
  tool_use_enforcement: auto
  reasoning_effort: high
  gateway_timeout: 1200
  api_max_retries: 3

## Toolsets: read-heavy, memory, search — inspection toolkit
toolsets:
- hermes-cli
- memory
- session_search
- skills
- file
- vision
- code_execution

display:
  personality: helpful
  show_reasoning: true
  show_cost: false
  streaming: true
  interim_assistant_messages: true

## Scheduling:
## Subject to Ollama Cloud peak degradation 13:00–18:00 UTC+2
## Nous: no known peak constraints
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
