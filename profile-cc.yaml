## CC profile — DeepSeek V4 Pro on Ollama Cloud (deplete quotas ASAP)
## Usage: hermes -p CC
## Urgency: Ollama Cloud is being phased out (hostile personnel).
##          Burn remaining quotas before refund/escalation concludes.

model:
  default: deepseek-v4-pro
  provider: ollama-cloud
  base_url: https://ollama.com/v1
  api_mode: chat_completions
providers: {}
fallback_providers:
- provider: openrouter
  model: deepseek/deepseek-v4-flash:free
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions
credential_pool_strategies: {}

## Ollama Cloud — DEPLETE ASAP. Default mainline companion.
## Max turns unlimited, full reasoning, full toolset.
agent:
  max_turns: 9999
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  clarify_timeout: 600
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  image_input_mode: auto

## Toolsets: full system access
toolsets:
- hermes-cli
- terminal
- file
- code_execution
- web
- memory
- session_search
- skills
- vision
- image_gen
- tts
- cronjob

display:
  personality: concise
  show_reasoning: true
  show_cost: true
  streaming: true
  interim_assistant_messages: false

## Scheduling:
## Ollama Cloud peak: 13:00–18:00 UTC+2 — AVOID if possible
## Best window: 18:00–02:00 UTC+2 (off-peak)
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 10
